name: php
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: ssh-connection
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{secrets.IP}}
          username: ${{secrets.USERNAME}}
          key: ${{secrets.PASSWORD}}

          script: |
           cd /home/sahil/kids_learning
           git pull origin main
           pm2 delete all
           pm2 start "php -S 0.0.0.0:8001" --name "kids learning"
           cd /home/ubuntu/phpMyAdmin-5.2.3-all-languages 
           pm2 start "php -S 0.0.0.0:8002" --name "php my admin"
           pm2 restart all
           
      
